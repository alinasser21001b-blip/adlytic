# adlytic — production web/API (الخدمة الوحيدة التي تنشر من GitHub)
[build]
builder = "NIXPACKS"
watchPatterns = [
  "src/**",
  "prisma/**",
  "package.json",
  "package-lock.json",
  "nixpacks.toml",
  "railway.toml",
  ".npmrc",
  "tsconfig.json",
  "prisma.config.ts",
  ".deploy/**",
]

[deploy]
startCommand = "npx prisma migrate deploy && node dist/src/api/serve.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
overlapSeconds = 30
drainingSeconds = 5
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
