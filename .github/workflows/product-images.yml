# ============================================================
# مزامنة صور المنتجات آلياً — صيدلية در الشارقة
# يعمل تلقائياً عند أي تعديل على كتالوج المنتجات (منتج جديد)،
# أو يدوياً من تبويب Actions.
# يبحث في المصادر الموثوقة، يحمّل، يحسّن إلى WebP، يحدّث
# products.js، ويرفع commit بالنتائج + تقرير الصور.
# ============================================================
name: Product Images Sync

on:
  push:
    branches: [claude/laughing-hawking-j2u13w, main]
    paths: ["pharmacy/js/products.js"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pillow duckduckgo_search

      - name: Harvest candidates from trusted sources
        run: python3 pharmacy/tools/harvest-candidates.py || true

      - name: Run image pipeline (confidence gate 90%)
        run: python3 pharmacy/tools/image-pipeline.py

      - name: Commit results
        run: |
          git config user.name "product-images-bot"
          git config user.email "bot@users.noreply.github.com"
          git add pharmacy/images pharmacy/js/products.js pharmacy/tools/IMAGE_REPORT.md pharmacy/tools/image-candidates.json
          git diff --cached --quiet && echo "لا صور جديدة" && exit 0
          git commit -m "صور منتجات: مزامنة آلية (بوابة ثقة 90%)"
          git push
