<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adlytic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#13201c;--ink-soft:#3a4a44;--ink-faint:#6b7a73;
  --paper:#f3f0e7;--card:#fbfaf5;--line:#e0dccf;--line-strong:#cdc8b8;
  --sage:#5a7d6e;--sage-deep:#3f6051;--gold:#b8893f;--gold-soft:#e9d9b8;
  --rose:#a8543f;--rose-soft:#ecd2c8;--amber:#9a7b2e;--amber-soft:#ecdfbe;
  --good:#4f7d63;--good-soft:#d4e3d4;
  --shadow:0 1px 2px rgba(40,50,40,.04),0 8px 24px rgba(40,50,40,.05);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);font-size:18px;line-height:1.55;-webkit-font-smoothing:antialiased;padding:0 0 80px}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0 18px}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--sage),var(--sage-deep));display:flex;align-items:center;justify-content:center;position:relative;flex:none}
.brand-mark::before{content:"";width:14px;height:14px;border-radius:50%;border:2.5px solid var(--gold-soft);border-right-color:transparent;border-bottom-color:transparent;transform:rotate(45deg)}
.brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:-.01em}
.switcher{display:flex;gap:6px;background:var(--card);padding:5px;border-radius:12px;border:1px solid var(--line);box-shadow:var(--shadow)}
.switcher button{font-family:inherit;font-size:14px;font-weight:600;border:none;background:none;color:var(--ink-faint);padding:8px 15px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.switcher button .dot{width:8px;height:8px;border-radius:50%;background:var(--good);flex:none;opacity:.45}
.switcher button.on{background:var(--ink);color:var(--card)}
.switcher button.on .dot{opacity:1}

/* ── Nav bar (Sprint 2) ── */
.nav{display:flex;gap:2px;padding:10px 0 0;border-bottom:1px solid var(--line);margin-bottom:30px}
.nav-btn{font-family:inherit;font-size:15px;font-weight:600;border:none;background:none;color:var(--ink-faint);padding:9px 18px 11px;cursor:pointer;position:relative;transition:color .15s}
.nav-btn:hover{color:var(--ink-soft)}
.nav-btn.on{color:var(--sage-deep)}
.nav-btn.on::after{content:"";position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--sage-deep);border-radius:2px 2px 0 0}

/* ── Page headband ── */
.headband{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:22px;margin-bottom:30px;border-bottom:1px solid var(--line);flex-wrap:wrap;gap:16px}
.headband h1{font-family:'Fraunces',serif;font-weight:600;font-size:38px;line-height:1.05;letter-spacing:-.02em}
.headband .sub{color:var(--ink-faint);font-size:16px;margin-top:6px;font-weight:500}
.daterange{display:flex;gap:6px;background:var(--card);padding:5px;border-radius:12px;border:1px solid var(--line)}
.daterange button{font-family:inherit;font-size:14px;font-weight:600;border:none;background:none;color:var(--ink-faint);padding:7px 15px;border-radius:8px;cursor:pointer}
.daterange button.on{background:var(--ink);color:var(--card)}

/* ── Dashboard verdict ── */
.verdict{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:26px;display:grid;grid-template-columns:300px 1fr}
.verdict-score{padding:34px 32px;background:radial-gradient(120% 120% at 20% 0%,rgba(90,125,110,.10),rgba(90,125,110,0) 60%),linear-gradient(180deg,#f7f5ec,#f1eee2);border-right:1px solid var(--line);display:flex;flex-direction:column;justify-content:center}
.score-label{font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:18px}
.dial{position:relative;width:170px;height:170px;margin-bottom:6px}
.dial svg{transform:rotate(-90deg)}
.dial-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dial-num b{font-family:'Fraunces',serif;font-size:52px;font-weight:600;line-height:1;letter-spacing:-.02em}
.dial-num span{font-size:14px;color:var(--ink-faint);font-weight:600;margin-top:2px}
.score-pill{display:inline-flex;align-items:center;gap:7px;align-self:flex-start;font-size:14px;font-weight:700;padding:6px 13px;border-radius:99px;margin-top:10px}
.score-pill .d{width:8px;height:8px;border-radius:50%}
.verdict-body{padding:30px 32px;display:flex;flex-direction:column;gap:22px}
.vsection-label{font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}
.issue-chips{display:flex;flex-direction:column;gap:10px}
.chip{display:flex;align-items:center;gap:12px;font-size:16px;font-weight:500}
.chip .badge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;flex:none}
.badge.med,.badge.medium{background:var(--amber-soft);color:var(--amber)}
.badge.high{background:var(--rose-soft);color:var(--rose)}
.badge.critical{background:var(--rose-soft);color:var(--rose)}
.action-box{background:linear-gradient(180deg,#f9f6ec,#f4f0e2);border:1px solid var(--gold-soft);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start}
.action-box .ico{width:34px;height:34px;border-radius:9px;flex:none;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px}
.action-box .txt b{display:block;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.action-box .txt p{font-size:17px;font-weight:600;color:var(--ink);line-height:1.4}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:30px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px 16px;box-shadow:var(--shadow)}
.kpi .k-label{font-size:13px;font-weight:600;color:var(--ink-faint);letter-spacing:.02em}
.kpi .k-val{font-family:'IBM Plex Mono',monospace;font-size:23px;font-weight:600;letter-spacing:-.02em;margin:7px 0 5px;color:var(--ink)}
.kpi .k-delta{font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px}
.up{color:var(--good)}.down{color:var(--rose)}.flat{color:var(--ink-faint)}

/* ── Section headings ── */
.sec-head{display:flex;align-items:baseline;gap:12px;margin:8px 0 18px}
.sec-head h2{font-family:'Fraunces',serif;font-size:25px;font-weight:600;letter-spacing:-.01em}
.sec-head .rule{flex:1;height:1px;background:var(--line)}

/* ── Chart card ── */
.chartcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 26px 18px;margin-bottom:32px}
.chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.chart-top h3{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.legend{display:flex;gap:18px}
.leg{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--ink-soft)}
.leg i{width:11px;height:11px;border-radius:3px;display:block}
.chartbox{width:100%;height:260px;position:relative}
.chartbox svg{width:100%;height:100%;overflow:visible}
.axis{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint);font-weight:500;margin-top:8px;padding:0 2px}

/* ── Best/worst ── */
.bw-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:34px}
.bw{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 26px;position:relative;overflow:hidden}
.bw::before{content:"";position:absolute;top:0;left:0;right:0;height:4px}
.bw.best::before{background:linear-gradient(90deg,var(--good),var(--sage))}
.bw.worst::before{background:linear-gradient(90deg,var(--rose),#c87a5e)}
.bw-tag{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:7px;margin-bottom:16px}
.bw.best .bw-tag{background:var(--good-soft);color:var(--sage-deep)}
.bw.worst .bw-tag{background:var(--rose-soft);color:var(--rose)}
.bw h3{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin-bottom:4px}
.bw .bw-health{font-size:15px;font-weight:600;color:var(--ink-faint);margin-bottom:18px}
.bw .bw-health b{font-family:'IBM Plex Mono',monospace;color:var(--ink)}
.bw-stats{display:flex;gap:26px}
.bw-stat .l{font-size:13px;color:var(--ink-faint);font-weight:600}
.bw-stat .v{font-family:'IBM Plex Mono',monospace;font-size:21px;font-weight:600;margin-top:3px}
.bw-act{margin-top:16px;font-size:15px;font-weight:600;color:var(--sage-deep);display:flex;align-items:center;gap:8px}

/* ── Diagnoses / dcard ── */
.diag{display:flex;flex-direction:column;gap:16px}
.dcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 26px;display:grid;grid-template-columns:1fr 1fr;gap:28px;border-left:4px solid var(--line-strong)}
.dcard.sev-high,.dcard.sev-critical{border-left-color:var(--rose)}
.dcard.sev-medium{border-left-color:var(--amber)}
.dcard.sev-low{border-left-color:var(--ink-faint)}
.dcard-head{grid-column:1/-1;display:flex;align-items:center;gap:13px;margin-bottom:-6px;flex-wrap:wrap}
.dcard-head h3{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.sev-tag{font-size:12px;font-weight:700;letter-spacing:.04em;padding:4px 11px;border-radius:7px;text-transform:uppercase}
.sev-tag.high,.sev-tag.critical{background:var(--rose-soft);color:var(--rose)}
.sev-tag.medium{background:var(--amber-soft);color:var(--amber)}
.sev-tag.low{background:var(--line);color:var(--ink-faint)}
.dcode{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint);margin-left:auto;letter-spacing:.03em;background:var(--paper);padding:4px 9px;border-radius:6px;border:1px solid var(--line)}
.dcol h4{font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:11px}
.dcol ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.dcol li{font-size:16px;color:var(--ink-soft);display:flex;align-items:flex-start;gap:10px;line-height:1.45;font-weight:500}
.dcol.why li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--ink-faint);flex:none;margin-top:9px}
.dcol.fix li::before{content:"→";color:var(--sage);font-weight:700;flex:none;font-family:'IBM Plex Mono',monospace}
.evidence{grid-column:1/-1;margin-top:4px;padding-top:14px;border-top:1px dashed var(--line-strong);font-size:14px;color:var(--ink-faint);font-weight:500;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.evidence b{font-family:'IBM Plex Mono',monospace;color:var(--rose);font-weight:600}

/* ── Footer ── */
.foot{margin-top:40px;padding:18px 22px;border:1px dashed var(--line-strong);border-radius:12px;font-size:14px;color:var(--ink-faint);display:flex;gap:11px;align-items:center;line-height:1.5;font-weight:500}
.foot b{color:var(--ink-soft);font-weight:600}
.foot code{font-family:'IBM Plex Mono',monospace;background:var(--paper);padding:2px 7px;border-radius:5px;border:1px solid var(--line);color:var(--sage-deep);font-size:13px}

/* ── Login ── */
.login-wrap{max-width:400px;margin:60px auto;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:38px}
.login-wrap h2{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-bottom:6px}
.login-wrap .sub{font-size:15px;color:var(--ink-faint);font-weight:500;margin-bottom:26px}
.field{margin-bottom:17px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-faint);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.field input{width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:16px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--sage)}
.login-btn{width:100%;padding:13px;background:var(--ink);color:var(--card);border:none;border-radius:9px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.login-btn:disabled{opacity:.5;cursor:default}
.err-box{margin-bottom:18px;padding:10px 14px;background:var(--rose-soft);color:var(--rose);border-radius:8px;font-size:15px;font-weight:600;border:1px solid #e8c5bb}
.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid var(--line-strong);border-top-color:var(--sage);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{padding:48px;text-align:center;color:var(--ink-faint);font-size:16px;font-weight:500}

/* ════════════════ Sprint 2 additions ════════════════ */

/* ── Tables ── */
.page-table-wrap{overflow-x:auto;margin-bottom:32px}
.page-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.page-table th{text-align:left;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);padding:12px 16px;border-bottom:1px solid var(--line);background:var(--paper)}
.page-table td{padding:14px 16px;border-bottom:1px solid var(--line);font-size:15px;color:var(--ink-soft);vertical-align:middle}
.page-table tbody tr:last-child td{border-bottom:none}
.page-table tbody tr:hover td{background:rgba(90,125,110,.04)}
.td-name{font-weight:600;color:var(--ink) !important}
.td-mono{font-family:'IBM Plex Mono',monospace;font-size:13px}
.td-arrow{color:var(--ink-faint);text-align:right;font-size:16px;width:32px}

/* ── Status tags ── */
.status-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.st-active{background:var(--good-soft);color:var(--good)}
.st-paused{background:var(--amber-soft);color:var(--amber)}
.st-deleted,.st-archived{background:var(--line);color:var(--ink-faint)}

/* ── Priority / role / direction tags ── */
.priority-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.p-critical,.p-high{background:var(--rose-soft);color:var(--rose)}
.p-medium{background:var(--amber-soft);color:var(--amber)}
.p-low{background:var(--line);color:var(--ink-faint)}
.role-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:6px;background:var(--gold-soft);color:var(--amber)}
.role-tag.role-owner{background:var(--ink);color:var(--card)}
.role-tag.role-viewer{background:var(--line);color:var(--ink-faint)}
.dir-up{color:var(--good)}.dir-down{color:var(--rose)}.dir-flat{color:var(--ink-faint)}

/* ── Recommendations cards ── */
.recs-list{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}
.rec-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.rec-code{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--ink);flex:1}
.rec-date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint);margin-left:auto}

/* ── Ad set cards ── */
.adset-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);margin-bottom:16px}
.adset-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.adset-name{font-family:'Fraunces',serif;font-size:20px;font-weight:600;color:var(--ink)}
.adset-count{font-size:13px;font-weight:600;color:var(--ink-faint);margin-left:auto}

/* ── Settings ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:8px}
.settings-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px 26px;box-shadow:var(--shadow)}
.settings-card-head{font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:16px}
.settings-dl{display:grid;grid-template-columns:auto 1fr;gap:8px 20px;align-items:baseline}
.settings-dl dt{font-size:13px;font-weight:600;color:var(--ink-faint)}
.settings-dl dd{font-size:15px;font-weight:500;color:var(--ink)}
.account-row{display:flex;flex-direction:column;gap:8px}
.account-name{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.account-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-btn{align-self:flex-start;margin-top:8px;font-family:inherit;font-size:14px;font-weight:700;padding:9px 18px;border-radius:9px;border:none;background:var(--sage);color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.sync-btn:hover{opacity:.88}
.sync-btn:disabled{opacity:.5;cursor:default}
.sync-result{margin-top:8px;font-size:14px;font-weight:600;padding:8px 13px;border-radius:8px}
.sync-ok{background:var(--good-soft);color:var(--good)}
.sync-err{background:var(--rose-soft);color:var(--rose)}

/* ── Back button ── */
.back-btn{font-family:inherit;font-size:14px;font-weight:700;border:none;background:none;color:var(--ink-faint);cursor:pointer;padding:0 0 10px;display:block;transition:color .15s}
.back-btn:hover{color:var(--sage-deep)}

/* ── Responsive ── */
@media(max-width:880px){
  body{font-size:17px}
  .verdict{grid-template-columns:1fr}
  .verdict-score{border-right:none;border-bottom:1px solid var(--line)}
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .bw-grid{grid-template-columns:1fr}
  .dcard{grid-template-columns:1fr;gap:20px}
  .headband h1{font-size:31px}
  .settings-grid{grid-template-columns:1fr}
}
@media(max-width:520px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.legend{display:none}}
@media(prefers-reduced-motion:no-preference){
  .dial-ring{transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)}
  .spark-path{transition:stroke-dashoffset 1.4s ease}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand"><div class="brand-mark"></div><div class="brand-name">Adlytic</div></div>
    <div class="switcher" id="switcher"></div>
  </div>

  <nav class="nav" id="nav" style="display:none"></nav>

  <div id="dash"></div>

  <div class="foot" id="foot" style="display:none">
    <span>🛈</span>
    <span><b>Live data from Adlytic API.</b> Components → Hooks → Services → fetch() → API routes → repositories → engines. The renderer only knows the DTO shape — no engine detail leaks through.</span>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════════════════════
//  API CLIENT LAYER
//  Hook contract: { data, loading, error, refetch }
//  Each hook is a plain object with a refetch() method that re-runs
//  its fetcher, painting loading → data|error states via renderApp().
// ════════════════════════════════════════════════════════════════════════

const API = '';

// ── Session store ────────────────────────────────────────────────────────
const session = {
  get token() { try { return sessionStorage.getItem('adlytic_token'); } catch { return null; } },
  set token(t) { try { t ? sessionStorage.setItem('adlytic_token', t) : sessionStorage.removeItem('adlytic_token'); } catch {} },
};

// ── Core fetch with bearer token ─────────────────────────────────────────
async function apiFetch(path, init = {}) {
  const headers = { 'Content-Type': 'application/json', ...(init.headers || {}) };
  if (session.token) headers['Authorization'] = `Bearer ${session.token}`;
  const res = await fetch(API + path, { ...init, headers });
  const json = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
  if (!res.ok) {
    const err = new Error(json.error || `HTTP ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return json;
}

// ── Hook factory ─────────────────────────────────────────────────────────
// Returns { data, loading, error, refetch }.
function makeHook(fetcher) {
  const h = { data: null, loading: false, error: null };
  h.refetch = async function () {
    h.loading = true; h.error = null;
    renderApp();
    try { h.data = await fetcher(); }
    catch (e) { h.error = e.message || String(e); }
    h.loading = false;
    renderApp();
    return h;
  };
  return h;
}

// ════════════════════════════════════════════════════════════════════════
//  HOOKS — every hook calls a real API endpoint, zero Promise.resolve stubs
// ════════════════════════════════════════════════════════════════════════

// 1. useAuth  →  GET /api/auth/me
const useAuth = makeHook(() => apiFetch('/api/auth/me'));

// 2. useDashboard  →  GET /api/dashboard/:workspaceId
function useDashboard(wsId) {
  return makeHook(() => apiFetch(`/api/dashboard/${wsId}`));
}

// 3. useCampaigns  →  GET /api/workspaces/:workspaceId/campaigns
function useCampaigns(wsId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/campaigns`));
}

// 4. useCampaign  →  GET /api/workspaces/:workspaceId/campaigns/:campaignId
function useCampaign(wsId, campaignId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/campaigns/${campaignId}`));
}

// 5. useInsights  →  GET /api/workspaces/:workspaceId/insights?days=N
function useInsights(wsId, days) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/insights?days=${days || 30}`));
}

// 6. useTrends  →  GET /api/workspaces/:workspaceId/insights/trends
function useTrends(wsId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/insights/trends`));
}

// 7. useRecs  →  GET /api/workspaces/:workspaceId/recommendations
function useRecs(wsId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/recommendations`));
}

// 8. useIssues  →  GET /api/workspaces/:workspaceId/issues
function useIssues(wsId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/issues`));
}

// 9. useWorkspace  →  GET /api/workspaces/:workspaceId
function useWorkspace(wsId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}`));
}

// 10. useMembers  →  GET /api/workspaces/:workspaceId/members
function useMembers(wsId) {
  return makeHook(() => apiFetch(`/api/workspaces/${wsId}/members`));
}

// ════════════════════════════════════════════════════════════════════════
//  APP STATE
// ════════════════════════════════════════════════════════════════════════

let workspaces   = [];       // [{id, name}] from useAuth
let current      = null;     // active workspaceId
let currentPage  = 'dashboard';
let drillId      = null;     // campaignId when on campaign-detail page

// Per-workspace hook caches — lazy, created on first navigate, keyed by wsId
// campaign cache keyed by campaignId instead
const cache = {
  dash:      {},   // wsId → hook
  campaigns: {},   // wsId → hook
  campaign:  {},   // campaignId → hook
  insights:  {},   // wsId → hook
  trends:    {},   // wsId → hook
  recs:      {},   // wsId → hook
  issues:    {},   // wsId → hook
  workspace: {},   // wsId → hook
  members:   {},   // wsId → hook
};

// ── Mutation state ────────────────────────────────────────────────────────

let loginState = { loading: false, error: null };
let syncState  = { loading: false, result: null };

// ════════════════════════════════════════════════════════════════════════
//  BOOT & NAVIGATION
// ════════════════════════════════════════════════════════════════════════

async function boot() {
  if (!session.token) { renderApp(); return; }
  await useAuth.refetch();
  if (useAuth.error || !useAuth.data) {
    session.token = null; useAuth.data = null;
    renderApp(); return;
  }
  workspaces = (useAuth.data.memberships || []).map(m => m.workspace);
  if (!workspaces.length) { renderApp(); return; }
  current = workspaces[0].id;
  await loadPage(currentPage);
}

async function loadPage(page) {
  const wsId = current;
  if (!wsId) return;

  switch (page) {
    case 'dashboard':
      if (!cache.dash[wsId]) cache.dash[wsId] = useDashboard(wsId);
      await cache.dash[wsId].refetch();
      break;

    case 'campaigns':
      if (!cache.campaigns[wsId]) cache.campaigns[wsId] = useCampaigns(wsId);
      if (!cache.campaigns[wsId].data) await cache.campaigns[wsId].refetch();
      else renderApp();
      break;

    case 'campaign':
      if (!drillId) { currentPage = 'campaigns'; await loadPage('campaigns'); return; }
      if (!cache.campaign[drillId]) cache.campaign[drillId] = useCampaign(wsId, drillId);
      if (!cache.campaign[drillId].data) await cache.campaign[drillId].refetch();
      else renderApp();
      break;

    case 'insights': {
      if (!cache.insights[wsId]) cache.insights[wsId] = useInsights(wsId, 30);
      if (!cache.trends[wsId])   cache.trends[wsId]   = useTrends(wsId);
      const needI = !cache.insights[wsId].data;
      const needT = !cache.trends[wsId].data;
      if (needI || needT) {
        await Promise.all([
          needI ? cache.insights[wsId].refetch() : Promise.resolve(),
          needT ? cache.trends[wsId].refetch()   : Promise.resolve(),
        ]);
      } else renderApp();
      break;
    }

    case 'recommendations': {
      if (!cache.recs[wsId])   cache.recs[wsId]   = useRecs(wsId);
      if (!cache.issues[wsId]) cache.issues[wsId] = useIssues(wsId);
      const needR = !cache.recs[wsId].data;
      const needIs = !cache.issues[wsId].data;
      if (needR || needIs) {
        await Promise.all([
          needR  ? cache.recs[wsId].refetch()   : Promise.resolve(),
          needIs ? cache.issues[wsId].refetch() : Promise.resolve(),
        ]);
      } else renderApp();
      break;
    }

    case 'settings': {
      if (!cache.workspace[wsId]) cache.workspace[wsId] = useWorkspace(wsId);
      if (!cache.members[wsId])   cache.members[wsId]   = useMembers(wsId);
      const needW = !cache.workspace[wsId].data;
      const needM = !cache.members[wsId].data;
      if (needW || needM) {
        await Promise.all([
          needW ? cache.workspace[wsId].refetch() : Promise.resolve(),
          needM ? cache.members[wsId].refetch()   : Promise.resolve(),
        ]);
      } else renderApp();
      break;
    }
  }
}

async function navigate(page, id) {
  currentPage = page;
  drillId = id || null;
  await loadPage(page);
}

async function select(wsId) {
  if (current === wsId) return;
  current = wsId;
  drillId = null;
  syncState = { loading: false, result: null };
  await loadPage(currentPage);
}

// ── Login ─────────────────────────────────────────────────────────────────
async function handleLogin(email, password) {
  loginState = { loading: true, error: null };
  renderApp();
  try {
    const resp = await apiFetch('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ email, password }),
    });
    session.token = resp.token;
    loginState = { loading: false, error: null };
    await boot();
  } catch (e) {
    loginState = { loading: false, error: e.message || 'Sign in failed' };
    renderApp();
  }
}

function loginSubmit(e) {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return;
  handleLogin(email, password);
}

// ── Sync trigger  →  POST /api/workspaces/:workspaceId/sync ───────────────
async function triggerSync() {
  syncState = { loading: true, result: null };
  renderApp();
  try {
    const resp = await apiFetch(`/api/workspaces/${current}/sync`, { method: 'POST' });
    syncState = { loading: false, result: resp };
  } catch (e) {
    syncState = { loading: false, result: { error: e.message } };
  }
  renderApp();
}

// ════════════════════════════════════════════════════════════════════════
//  RENDERING — top-level dispatcher
// ════════════════════════════════════════════════════════════════════════

function renderApp() {
  const foot  = document.getElementById('foot');
  const navEl = document.getElementById('nav');

  // ── Not logged in ──────────────────────────────────────────────────────
  if (!session.token || (useAuth.data === null && !useAuth.loading)) {
    foot.style.display = 'none';
    navEl.style.display = 'none';
    document.getElementById('switcher').innerHTML = '';
    renderLogin();
    return;
  }
  // ── Auth loading ───────────────────────────────────────────────────────
  if (useAuth.loading) {
    foot.style.display = 'none';
    navEl.style.display = 'none';
    document.getElementById('switcher').innerHTML = '';
    document.getElementById('dash').innerHTML =
      `<div class="loading-state"><span class="spinner"></span>Connecting…</div>`;
    return;
  }
  // ── Auth error ─────────────────────────────────────────────────────────
  if (useAuth.error) {
    foot.style.display = 'none';
    navEl.style.display = 'none';
    document.getElementById('switcher').innerHTML = '';
    renderLogin(useAuth.error);
    return;
  }
  // ── No workspaces ──────────────────────────────────────────────────────
  if (!workspaces.length) {
    navEl.style.display = 'none';
    foot.style.display = '';
    document.getElementById('switcher').innerHTML = '';
    document.getElementById('dash').innerHTML =
      `<div class="loading-state">No workspaces found for this account.</div>`;
    return;
  }

  // ── Authenticated: render chrome ───────────────────────────────────────
  renderSwitcher();
  navEl.style.display = '';
  renderNav();

  // ── Dispatch to page renderer ──────────────────────────────────────────
  switch (currentPage) {
    case 'dashboard':       renderDashboardPage();      break;
    case 'campaigns':       renderCampaignsPage();      break;
    case 'campaign':        renderCampaignPage();       break;
    case 'insights':        renderInsightsPage();       break;
    case 'recommendations': renderRecsPage();           break;
    case 'settings':        renderSettingsPage();       break;
    default:                renderDashboardPage();
  }
}

// ── Helpers for page loading / error states ───────────────────────────────
function pageLoading(msg) {
  document.getElementById('foot').style.display = 'none';
  document.getElementById('dash').innerHTML =
    `<div class="loading-state"><span class="spinner"></span>${msg || 'Loading…'}</div>`;
}
function pageError(msg) {
  document.getElementById('foot').style.display = 'none';
  document.getElementById('dash').innerHTML =
    `<div class="loading-state" style="color:var(--rose)">Error: ${esc(msg)}</div>`;
}

  const hook = cache.dash[current];

  const hI = cache.insights[current];

  document.getElementById('foot').style.display = 'none';

  const stats  = hI.data || [];

  document.getElementById('dash').innerHTML = `
    <div class="headband">
      <div>
        <h1>Insights</h1>
        <div class="sub">Daily performance data · ${stats.length} day${stats.length !== 1 ? 's' : ''}</div>
      </div>

                   <td class="td-name">${m.user ? esc(m.user.name) : '—'}</td>
                   <td style="color:var(--ink-faint);font-size:14px">
                     ${m.user ? esc(m.user.email) : '—'}
                   </td>
                   <td>
                     <span class="role-tag role-${(m.role || '').toLowerCase()}">${esc(m.role)}</span>
                   </td>
                   <td class="td-mono">${fmtDate(m.createdAt)}</td>
                 </tr>`).join('')}
             </tbody>
           </table>
         </div>`
    }
  `;
}

function renderLogin(errorMsg) {
  const err  = errorMsg || loginState.error;
  const busy = loginState.loading;
  document.getElementById('dash').innerHTML = `
    <div class="login-wrap">
      <h2>Sign in</h2>
      <div class="sub">Connect to the live API to see real account data.</div>
      ${err ? `<div class="err-box">${esc(err)}</div>` : ''}
      <form onsubmit="loginSubmit(event)">
        <div class="field">
          <label>Email</label>
          <input id="loginEmail" type="email" value="ali@adlytic.app" autocomplete="email" required>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="demo1234" autocomplete="current-password" required>
        </div>
        <button class="login-btn" type="submit" ${busy ? 'disabled' : ''}>
          ${busy ? '<span class="spinner"></span>Signing in…' : 'Sign in'}
        </button>
      </form>
    </div>
  `;
}

function renderSwitcher() {
  document.getElementById('switcher').innerHTML = workspaces.map(ws =>
    `<button class="${ws.id === current ? 'on' : ''}" onclick="select('${esc(ws.id)}')">
       <span class="dot"></span>${esc(ws.name)}
     </button>`
  ).join('');
}

const NAV_PAGES = [
  { id: 'dashboard',       label: 'Dashboard'       },
  { id: 'campaigns',       label: 'Campaigns'       },
  { id: 'insights',        label: 'Insights'        },
  { id: 'recommendations', label: 'Recommendations' },
  { id: 'settings',        label: 'Settings'        },
];

function renderNav() {
  const active = currentPage === 'campaign' ? 'campaigns' : currentPage;
  document.getElementById('nav').innerHTML = NAV_PAGES.map(p =>
    `<button class="nav-btn ${p.id === active ? 'on' : ''}" onclick="navigate('${p.id}')">
       ${p.label}
     </button>`
  ).join('');
}

// ════════════════════════════════════════════════════════════════════════
//  DASHBOARD RENDERER  (consumes DashboardDTO — unchanged from original)
// ════════════════════════════════════════════════════════════════════════

function renderDashboard(d) {
  const w = d.workspace, h = d.health;
  const sync = w.lastSyncedAt ? timeAgo(w.lastSyncedAt) : 'never';
  const issuesTop = d.issues.slice(0, 3);

  const kpiHTML = d.kpis.map(k => `
    <div class="kpi">
      <div class="k-label">${esc(k.label)}</div>
      <div class="k-val">${esc(k.display)}</div>
      <div class="k-delta">${deltaText(k)}</div>
    </div>`).join('');

  const chipsHTML = issuesTop.map(i => `
    <div class="chip">
      <span class="badge ${i.severity.toLowerCase()}">${esc(i.severity)}</span>
      ${esc(i.title)}${i.evidence && i.evidence.peakCampaign
        ? ` on ${esc(i.evidence.peakCampaign)}` : ''}
    </div>`).join('');

  const dates = d.trendSeries.dates;
  const axis  = [0, 7, 14, 21, 29]
    .map(i => dates[i] ? fmtDate(dates[i]) : '').filter(Boolean);

  const best  = d.bestCampaign, worst = d.worstCampaign;
  const bestStats  = best  ? [
    ['Messages', best.messages],
    ['CTR', best.ctr   != null ? best.ctr   + '%' : '—'],
    ['CPM', best.cpm   != null ? best.cpm         : '—'],
  ] : [];
  const worstStats = worst ? [
    ['Messages', worst.messages],
    ['CTR', worst.ctr  != null ? worst.ctr  + '%' : '—'],
    ['Freq.', worst.frequency != null ? worst.frequency : '—'],
  ] : [];

  const diagHTML = d.issues.map(i => {
    const sev = i.severity.toLowerCase();
    const ev  = i.evidence || {};
    const evParts = Object.entries(ev)
      .map(([k, v]) => `${k}: <b>${esc(v)}</b>`).join(' · ');
    return `
    <div class="dcard sev-${sev}">
      <div class="dcard-head">
        <h3>${esc(i.title)}</h3>
        <span class="sev-tag ${sev}">${esc(i.severity)} severity</span>
        <span class="dcode">${esc(i.code)}</span>
      </div>
      <div class="dcol why">
        <h4>Why this is happening</h4>
        <ul>${i.causes.map(c => `<li>${esc(c)}</li>`).join('')}</ul>
      </div>
      <div class="dcol fix">
        <h4>What to do</h4>
        <ul>${i.recommendations.map(r => `<li>${esc(r)}</li>`).join('')}</ul>
      </div>
      ${evParts ? `<div class="evidence">Evidence — ${evParts}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('dash').innerHTML = `
    <div class="headband">
      <div>
        <h1>${esc(w.name)}</h1>
        <div class="sub">
          ${esc(industryLabel(w.industry))} · ${w.activeCampaigns} active campaigns · synced ${sync}
        </div>
      </div>
      <div class="daterange">
        <button>7D</button><button class="on">30D</button><button>90D</button>
      </div>
    </div>

    <div class="verdict">
      <div class="verdict-score">
        <div class="score-label">Account Health</div>
        <div class="dial">
          ${dial(h.score, h.band)}
          <div class="dial-num"><b>${h.score}</b><span>/ 100</span></div>
        </div>
        <div class="score-pill"
             style="background:${colorFor(h.band)}22;color:${colorFor(h.band)}">
          <span class="d" style="background:${colorFor(h.band)}"></span> ${cap(h.band)}
        </div>
      </div>
      <div class="verdict-body">
        <div>
          <div class="vsection-label">Top issues this month</div>
          <div class="issue-chips">
            ${chipsHTML || '<div style="color:var(--ink-faint);font-size:15px">No issues detected</div>'}
          </div>
        </div>
        ${d.priorityAction ? `
        <div class="action-box">
          <div class="ico">✦</div>
          <div class="txt">
            <b>Priority action</b>
            <p>${esc(d.priorityAction.text)}${
              d.priorityAction.details && d.priorityAction.details.withinDays
                ? ` — within ${d.priorityAction.details.withinDays} days` : ''
            }</p>
          </div>
        </div>` : ''}
      </div>
    </div>

    <div class="kpi-grid">${kpiHTML}</div>

    <div class="sec-head"><h2>Trends</h2><span class="rule"></span></div>
    <div class="chartcard">
      <div class="chart-top">
        <h3>Messages per day</h3>
        <div class="legend">
          <span class="leg"><i style="background:#5a7d6e"></i>Messages</span>
          <span class="leg"><i style="background:#b8893f;opacity:.5"></i>Spend</span>
        </div>
      </div>
      <div class="chartbox">
        <svg viewBox="0 0 920 260" preserveAspectRatio="none">${chart(d.trendSeries)}</svg>
      </div>
      <div class="axis">${axis.map(a => `<span>${a}</span>`).join('')}</div>
    </div>

    <div class="sec-head"><h2>Standouts</h2><span class="rule"></span></div>
    <div class="bw-grid">
      ${best ? `
      <div class="bw best">
        <span class="bw-tag">◆ Best campaign</span>
        <h3>${esc(best.name)}</h3>
        <div class="bw-health">Health <b>${best.health}</b> · ${cap(best.band)}</div>
        <div class="bw-stats">
          ${bestStats.map(([l, v]) =>
            `<div class="bw-stat"><div class="l">${l}</div><div class="v">${esc(v)}</div></div>`
          ).join('')}
        </div>
        <div class="bw-act">✓ Strong performer — consider scaling</div>
      </div>` : ''}
      ${worst ? `
      <div class="bw worst">
        <span class="bw-tag">▲ Needs attention</span>
        <h3>${esc(worst.name)}</h3>
        <div class="bw-health">Health <b>${worst.health}</b> · ${cap(worst.band)}</div>
        <div class="bw-stats">
          ${worstStats.map(([l, v]) =>
            `<div class="bw-stat"><div class="l">${l}</div><div class="v">${esc(v)}</div></div>`
          ).join('')}
        </div>
        <div class="bw-act">→ Review against the diagnoses below</div>
      </div>` : ''}
    </div>

    <div class="sec-head"><h2>Diagnoses</h2><span class="rule"></span></div>
    <div class="diag">
      ${diagHTML || '<div style="color:var(--ink-faint);font-size:15px;padding:20px 0">No issues detected for this period.</div>'}
    </div>
  `;

  // animate sparklines after paint
  requestAnimationFrame(() => {
    document.querySelectorAll('.spark-path').forEach(p => {
      const len = p.getTotalLength();
      p.style.strokeDasharray  = len;
      p.style.strokeDashoffset = len;
      requestAnimationFrame(() => { p.style.strokeDashoffset = 0; });
    });
  });
}

// ════════════════════════════════════════════════════════════════════════
//  CHART + DIAL  (unchanged from original)
// ════════════════════════════════════════════════════════════════════════

const colorFor = b =>
  ({ excellent:'#4f7d63', good:'#5a7d6e', attention:'#9a7b2e', poor:'#a8543f' }[b] || '#5a7d6e');

const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

function deltaText(kpi) {
  if (kpi.deltaPct === null) return `<span class="flat">—</span>`;
  const pct    = Math.round(Math.abs(kpi.deltaPct) * 100);
  const arrow  = kpi.direction === 'up' ? '▲' : kpi.direction === 'down' ? '▼' : '■';
  const isGood = (kpi.direction === 'up') === kpi.goodWhenUp;
  const cls    = kpi.direction === 'flat' ? 'flat' : (isGood ? 'up' : 'down');
  return `<span class="${cls}">${arrow} ${pct}%</span>`;
}

function dial(score, band) {
  const C   = 2 * Math.PI * 72;
  const off = C * (1 - score / 100);
  const col = colorFor(band);
  return `<svg width="170" height="170" viewBox="0 0 170 170">
    <circle cx="85" cy="85" r="72" fill="none" stroke="#e6e2d5" stroke-width="13"/>
    <circle class="dial-ring" cx="85" cy="85" r="72" fill="none" stroke="${col}" stroke-width="13"
            stroke-linecap="round"
            stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
  </svg>`;
}

function chart(series) {
  const W = 920, H = 260, padL = 8, padR = 8, padT = 14, padB = 4;
  const iW = W - padL - padR, iH = H - padT - padB;
  const norm = a => {
    const mn = Math.min(...a), mx = Math.max(...a);
    return a.map(v => (v - mn) / ((mx - mn) || 1));
  };
  function pathFor(arr, sw, op, fill, fillOp) {
    const n   = norm(arr);
    const pts = n.map((v, i) => [padL + (i / (arr.length - 1)) * iW, padT + (1 - v) * iH]);
    let d = 'M' + pts[0][0].toFixed(1) + ',' + pts[0][1].toFixed(1);
    for (let i = 1; i < pts.length; i++) {
      const [x, y] = pts[i], [px, py] = pts[i - 1];
      d += ` Q${px.toFixed(1)},${py.toFixed(1)} ${((px+x)/2).toFixed(1)},${((py+y)/2).toFixed(1)} T${x.toFixed(1)},${y.toFixed(1)}`;
    }
    let s = '';
    if (fill) {
      const area = d
        + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+iH).toFixed(1)}`
        + ` L${pts[0][0].toFixed(1)},${(padT+iH).toFixed(1)} Z`;
      s += `<path d="${area}" fill="${fill}" opacity="${fillOp}"/>`;
    }
    s += `<path class="spark-path" d="${d}" fill="none" stroke="${fill||'#b8893f'}"
            stroke-width="${sw}" opacity="${op}"
            stroke-linejoin="round" stroke-linecap="round"/>`;
    const last = pts[pts.length - 1];
    s += `<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}"
            r="${sw > 2 ? 4 : 3.4}" fill="${fill||'#b8893f'}" opacity="${op}"/>`;
    return s;
  }
  let grid = '';
  for (let g = 0; g <= 3; g++) {
    const y = padT + (g / 3) * iH;
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"
               stroke="#e6e2d5" stroke-width="1"/>`;
  }
  return grid
    + pathFor(series.spend,    1.6, 0.38, '#b8893f', 0)
    + pathFor(series.messages, 3,   1,    '#5a7d6e', 0.13);
}

// ── Formatting helpers ────────────────────────────────────────────────────
function cap(s)  { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function industryLabel(i) { return i ? cap(i) : '—'; }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function timeAgo(iso) {
  const ms = Date.now() - new Date(iso).getTime();
  const h  = Math.round(ms / 3.6e6);
  if (h < 1)  return 'just now';
  if (h < 24) return h + 'h ago';
  return Math.round(h / 24) + 'd ago';
}

boot();
